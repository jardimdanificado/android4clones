<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTPatcher</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text);
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            color: white;
            cursor: pointer;
            margin-right: 1rem;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary-hover);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .checkbox-group input {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #log {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 0.5rem;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            color: var(--text-dim);
        }

        .log-entry {
            margin-bottom: 0.25rem;
        }

        .log-info {
            color: var(--text-dim);
        }

        .log-success {
            color: var(--success);
        }

        .log-error {
            color: #ef4444;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Android4Clone Patcher</h1>

        <div class="form-group">
            <label for="targetFile">Target DTS (Base)</label>
            <input type="file" id="targetFile" accept=".dts">
        </div>

        <div class="form-group">
            <label for="stockFile">Stock DTS (Hardware Info)</label>
            <input type="file" id="stockFile" accept=".dts">
        </div>

        <div class="form-group">
            <label for="outputName">Output Filename</label>
            <input type="text" id="outputName" value="rk3326-r36s-android.dts">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="experimental">
            <label for="experimental">Enable Experimental Tweaks (MMC, PWM, LDO)</label>
        </div>

        <button id="patchBtn">Apply Patches & Download</button>

        <div id="log">Ready. Select files to begin.</div>

        <footer>
            Built for RK3326 Handheld Clones
        </footer>
    </div>

    <script type="module">
        import { parseDTS } from './parser36.js';
        import { applyAndroidPatches } from './patcher-logic.js';

        const logEl = document.getElementById('log');
        const patchBtn = document.getElementById('patchBtn');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = msg;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        patchBtn.addEventListener('click', async () => {
            const targetInput = document.getElementById('targetFile');
            const stockInput = document.getElementById('stockFile');
            const outputName = document.getElementById('outputName').value || 'rk3326-r36-android.dts';
            const experimental = document.getElementById('experimental').checked;

            if (!targetInput.files[0]) {
                log('Error: Please select a target DTS file.', 'error');
                return;
            }

            logEl.innerHTML = '';
            log('Starting patch process...');

            try {
                log(`Reading ${targetInput.files[0].name}...`);
                const targetSrc = await readFile(targetInput.files[0]);
                const dts = parseDTS(targetSrc);

                let stock = null;
                if (stockInput.files[0]) {
                    log(`Reading ${stockInput.files[0].name}...`);
                    const stockSrc = await readFile(stockInput.files[0]);
                    stock = parseDTS(stockSrc);
                }

                applyAndroidPatches(dts, stock, {
                    experimental,
                    logger: (msg) => log(msg)
                });

                log('Generating output...', 'info');
                const result = dts.toString();

                const blob = new Blob([result], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = outputName;
                a.click();
                URL.revokeObjectURL(url);

                log('Done! Download started.', 'success');
            } catch (err) {
                console.error(err);
                log(`Error: ${err.message}`, 'error');
            }
        });
    </script>
</body>

</html>
